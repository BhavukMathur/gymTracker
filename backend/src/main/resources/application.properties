spring.application.name=gymtracker
spring.profiles.default=dev

spring.datasource.url=jdbc:mysql://localhost:3306/gymtracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootroot
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=your-super-secret-key-that-is-at-least-32-characters
app.jwt.expiration-ms=86400000

# Actuator + Micrometer metrics (see HttpRequestLoggingFilter for [Actuator/Micrometer] logs)
management.endpoints.web.exposure.include=health,metrics,prometheus,info
management.endpoint.health.show-details=when_authorized

# Distributed tracing (Brave bridge); traceId/spanId appear in MDC and in [Tracing] filter logs
management.tracing.sampling.probability=1.0
