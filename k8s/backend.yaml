# Build and tag from repo root: docker build -t gymtracker-backend:latest ./backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gymtracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mysql 3306; do sleep 2; done"]
      containers:
        - name: backend
          image: gymtracker-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/gymtracker?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-root-password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-app-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /api/app/profile
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/app/profile
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gymtracker
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
