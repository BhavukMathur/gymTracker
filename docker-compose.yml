# Full stack in three services (frontend → backend → DB over the Docker network).
# Host ports avoid clashing with local dev: Docker API defaults to 18080 (mvn uses 8080; Vite uses 5173).
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gymtracker}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-gymtracker}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootroot}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-your-super-secret-key-that-is-at-least-32-characters}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/app/profile >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:18080}
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
